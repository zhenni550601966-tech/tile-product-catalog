<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tile Product Catalog</title>
<style>
  :root {
    --ink: #222019;
    --sage: #39483d;
    --sage-2: #4f5f51;
    --bone: #f5efe3;
    --paper: #fffaf0;
    --clay: #b76437;
    --ochre: #d49a58;
    --line: #d7c8b4;
    --muted: #756c5e;
    --white: #fffdf8;
    --shadow: 0 14px 34px rgba(34, 32, 25, .12);
    --serif: Georgia, "Times New Roman", serif;
    --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --filter-height: 66px;
    --tabs-height: 58px;
    --quick-height: 0px;
  }

  * { box-sizing: border-box; }
  html {
    scroll-behavior: smooth;
    max-width: 100%;
    overflow-x: hidden;
  }
  body {
    margin: 0;
    max-width: 100%;
    overflow-x: hidden;
    color: var(--ink);
    background: var(--bone);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
  }

  button, select { font: inherit; }
  a { color: inherit; text-decoration: none; }

  .hero {
    padding: 42px 22px 34px;
    background:
      linear-gradient(135deg, rgba(57,72,61,.92), rgba(34,32,25,.78)),
      radial-gradient(circle at 18% 28%, rgba(212,154,88,.38), transparent 28%);
    color: var(--paper);
    text-align: center;
  }

  .hero h1 {
    margin: 0;
    font-family: var(--serif);
    font-size: clamp(34px, 5vw, 58px);
    font-weight: 400;
    line-height: 1;
  }

  .hero p {
    margin: 14px auto 0;
    max-width: 760px;
    color: rgba(255,250,240,.78);
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 22px;
  }

  .stat {
    min-width: 128px;
    padding: 11px 14px;
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 8px;
    background: rgba(255,255,255,.08);
  }

  .stat b { display: block; font-size: 20px; }
  .stat span {
    display: block;
    margin-top: 2px;
    color: rgba(255,250,240,.66);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .filter-bar {
    position: sticky;
    top: 0;
    z-index: 70;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 22px;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
  }

  .filter-bar label {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  select, .reset-btn {
    min-height: 38px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--white);
    color: var(--ink);
    padding: 8px 12px;
    cursor: pointer;
  }

  select {
    max-width: 100%;
  }

  .reset-btn {
    background: var(--sage);
    border-color: var(--sage);
    color: var(--paper);
  }

  .count-text {
    margin-left: auto;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
  }

  .cat-tabs {
    position: sticky;
    top: var(--filter-height);
    z-index: 60;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 12px 22px;
    background: #eee3d3;
    border-bottom: 1px solid var(--line);
    box-shadow: 0 10px 24px rgba(34,32,25,.08);
  }

  .series-menu {
    position: relative;
  }

  .series-menu summary {
    list-style: none;
  }

  .series-menu summary::-webkit-details-marker {
    display: none;
  }

  .tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--clay);
    border-radius: 999px;
    padding: 10px 18px;
    background: var(--white);
    color: var(--sage);
    font-weight: 700;
    cursor: pointer;
  }

  .tab:hover, .tab.active {
    background: var(--clay);
    color: var(--paper);
  }

  .series-menu[open] .tab {
    background: var(--clay);
    color: var(--paper);
  }

  .series-dropdown {
    position: fixed;
    top: calc(var(--filter-height) + var(--tabs-height) + 10px);
    left: var(--dropdown-left, max(22px, calc((100vw - 1380px) / 2 + 22px)));
    z-index: 90;
    width: min(360px, calc(100vw - 44px));
    display: grid;
    gap: 6px;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--white);
    box-shadow: 0 18px 42px rgba(34,32,25,.22);
  }

  .menu-item {
    border: 0;
    border-radius: 7px;
    background: transparent;
    color: var(--sage);
    padding: 9px 10px;
    text-align: left;
    font-size: 13px;
    cursor: pointer;
  }

  .menu-item:hover, .menu-item.active {
    background: var(--sage);
    color: var(--paper);
  }

  .cat-tabs.menu-open {
    z-index: 85;
    overflow: visible;
  }

  main {
    max-width: 1380px;
    margin: 0 auto;
    padding: 24px 18px 60px;
  }

  .series-section {
    margin-bottom: 30px;
    scroll-margin-top: calc(var(--filter-height) + var(--tabs-height) + var(--quick-height) + 18px);
  }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 18px;
    padding: 18px 22px;
    border-radius: 8px 8px 0 0;
    background: var(--sage);
    color: var(--paper);
    border-bottom: 3px solid var(--ochre);
  }

  .section-header h2 {
    margin: 0;
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 400;
  }

  .section-header span {
    color: rgba(255,250,240,.68);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .spec-block {
    margin-top: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--white);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .spec-block.hidden { display: none; }

  .spec-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 18px;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }

  .spec-name {
    font-weight: 750;
    color: var(--sage);
  }

  .spec-meta {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
  }

  .spec-detail {
    display: block;
    margin-top: 5px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .toggle {
    color: var(--muted);
    transition: transform .18s ease;
  }

  .spec-block.collapsed .toggle { transform: rotate(-90deg); }
  .spec-block.collapsed .product-grid { display: none; }
  .spec-block.collapsed .spec-subgroup { display: none; }

  .spec-subgroup.hidden { display: none; }

  .subspec-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px 0;
    color: var(--ink);
    font-size: 14px;
    font-weight: 750;
  }

  .subspec-title span {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
  }

  .subspec-title small {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    line-height: 1.45;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    padding: 16px;
  }

  .product-card {
    border: 1px solid #eadfce;
    border-radius: 8px;
    background: #fff;
    padding: 0;
    overflow: hidden;
    cursor: pointer;
    text-align: left;
    transition: transform .18s ease, box-shadow .18s ease;
  }

  .product-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 28px rgba(34,32,25,.16);
  }

  .product-card.hidden { display: none; }

  .product-card img {
    width: 100%;
    aspect-ratio: 4 / 5;
    object-fit: contain;
    display: block;
    background: #f6efe4;
  }

  .card-info {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 11px;
  }

  .code {
    color: var(--sage);
    font-weight: 800;
    font-size: 13px;
  }

  .size {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10px;
    max-width: 56%;
    text-align: right;
  }

  .placeholder-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    padding: 16px;
  }

  .placeholder-card {
    min-height: 140px;
    border: 1px dashed var(--line);
    border-radius: 8px;
    display: grid;
    place-items: center;
    padding: 16px;
    color: var(--muted);
    text-align: center;
    background: #fbf6ed;
  }

  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 28px 28px 96px;
    background: rgba(15, 16, 13, .94);
  }

  .lightbox.active { display: flex; }

  .lightbox img {
    max-width: min(92vw, 1180px);
    max-height: 82vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 22px 70px rgba(0,0,0,.5);
  }

  .lb-close, .lb-nav {
    position: absolute;
    z-index: 3;
    border: 1px solid rgba(255,255,255,.2);
    background: rgba(20,20,18,.72);
    color: white;
    cursor: pointer;
  }

  .lb-close {
    top: 20px;
    right: 22px;
    min-width: 92px;
    height: 42px;
    padding: 0 14px;
    font-size: 14px;
    font-weight: 750;
  }

  .lb-nav {
    top: 50%;
    transform: translateY(-50%);
    display: grid;
    place-items: center;
    width: 54px;
    height: 54px;
    border-radius: 999px;
    font-size: 38px;
    line-height: 1;
    box-shadow: 0 12px 34px rgba(0,0,0,.34);
  }

  .lb-nav:hover {
    background: var(--ochre);
    color: var(--ink);
  }

  .lb-nav.prev { left: max(18px, env(safe-area-inset-left)); }
  .lb-nav.next { right: max(18px, env(safe-area-inset-right)); }

  .lb-caption {
    position: absolute;
    left: 28px;
    right: 28px;
    bottom: 60px;
    color: rgba(255,255,255,.78);
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .04em;
  }

  .lb-thumbs {
    position: absolute;
    left: 28px;
    right: 28px;
    bottom: 14px;
    display: flex;
    justify-content: center;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0;
  }

  .lb-thumb {
    width: 54px;
    height: 42px;
    border: 1px solid rgba(255,255,255,.24);
    border-radius: 6px;
    padding: 0;
    background: rgba(255,255,255,.08);
    overflow: hidden;
    cursor: pointer;
    opacity: .68;
  }

  .lb-thumb.active {
    border-color: var(--ochre);
    opacity: 1;
  }

  .lb-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .lb-help {
    display: block;
    margin-top: 5px;
    color: rgba(255,255,255,.52);
    font-size: 11px;
  }

  .floating-nav {
    position: fixed;
    right: 18px;
    z-index: 40;
    width: 48px;
    height: 48px;
    border: 1px solid rgba(255,255,255,.42);
    border-radius: 999px;
    background: var(--sage);
    color: var(--paper);
    box-shadow: 0 12px 28px rgba(34,32,25,.24);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    opacity: 0;
    pointer-events: none;
    transform: translateY(10px);
    transition: opacity .18s ease, transform .18s ease, background .18s ease;
  }

  .floating-nav.to-top {
    bottom: 18px;
  }

  .floating-nav.to-bottom {
    bottom: 76px;
  }

  .floating-nav.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .floating-nav:hover {
    background: var(--ochre);
    color: var(--ink);
  }

  @media (max-width: 1100px) {
    .product-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }

  @media (max-width: 760px) {
    .hero {
      padding: 28px 14px 24px;
    }

    .hero h1 {
      font-size: 34px;
    }

    .filter-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
      padding: 10px 12px;
    }

    .filter-bar label {
      display: none;
    }

    .filter-bar select,
    .filter-bar .reset-btn {
      width: 100%;
      min-width: 0;
      min-height: 36px;
      padding: 7px 9px;
      font-size: 13px;
    }

    .filter-bar .reset-btn {
      grid-column: span 1;
    }

    .count-text { margin-left: 0; width: 100%; }
    .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .placeholder-grid { grid-template-columns: 1fr; }
    .section-header { align-items: flex-start; flex-direction: column; }
    .cat-tabs {
      justify-content: flex-start;
      overflow-x: auto;
      flex-wrap: nowrap;
      padding: 10px 12px;
    }
    .cat-tabs.menu-open {
      overflow-x: auto;
      overflow-y: visible;
    }
    .tab { white-space: nowrap; }
    main {
      padding: 18px 10px 34px;
    }
    .spec-header {
      align-items: flex-start;
      padding: 12px;
    }
    .spec-name {
      display: block;
      line-height: 1.25;
    }
    .spec-detail {
      font-size: 11px;
    }
    .product-grid {
      gap: 10px;
      padding: 10px;
    }
    .card-info {
      padding: 9px;
    }
    .code {
      font-size: 13px;
    }
    .size {
      font-size: 10px;
    }
    .series-dropdown {
      left: 12px;
      right: 12px;
      top: calc(var(--filter-height) + var(--tabs-height) + 8px);
      width: auto;
      max-height: 54vh;
      overflow-y: auto;
    }
    .lightbox { padding: 72px 12px 108px; }
    .lightbox img { max-width: 100%; max-height: 74vh; }
    .lb-close { top: 14px; right: 14px; }
    .lb-nav {
      width: 46px;
      height: 46px;
      font-size: 32px;
    }
    .lb-nav.prev { left: 10px; }
    .lb-nav.next { right: 10px; }
    .floating-nav {
      right: 12px;
      width: 44px;
      height: 44px;
    }

    .floating-nav.to-top { bottom: 12px; }
    .floating-nav.to-bottom { bottom: 64px; }
  }

  @media (max-width: 430px) {
    .product-grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 30px; }
  }

  @media print {
    .filter-bar, .cat-tabs { display: none; }
    main { max-width: none; padding: 0; }
    .spec-block { break-inside: avoid; box-shadow: none; }
  }
</style>
</head>
<body>
<header class="hero">
  <h1>Tile Product Catalog</h1>
</header>

<div class="filter-bar">
  <label for="sizeFilter">Filter by size</label>
  <select id="sizeFilter" onchange="applySizeFilter()">
    <option value="">All sizes</option>
    <option value="150x900">150x900mm</option>
    <option value="200x1000">200x1000mm</option>
    <option value="200x1200">200x1200mm</option>
    <option value="300x1200">300x1200mm</option>
    <option value="470x1200">470x1200mm</option>
    <option value="600x1200">600x1200mm</option>
    <option value="720x900">720x900mm</option>
    <option value="750x750">750x750mm</option>
    <option value="750x1350">750x1350mm</option>
    <option value="800x800">800x800mm</option>
    <option value="1000x1000">1000x1000mm</option>
    <option value="1200x1200">1200x1200mm</option>
  </select>
  <label for="seriesFilter">Series</label>
  <select id="seriesFilter" onchange="applySeriesFilter()">
    <option value="">All series</option>
    <option value="wood">Wood Grain</option>
    <option value="stair">Stair Step Series</option>
    <option value="tile800">800x800 Series</option>
    <option value="tile1000">1000x1000 Series</option>
    <option value="tile1200">1200x1200 Series</option>
    <option value="carpet">Carpet</option>
  </select>
  <button class="reset-btn" type="button" onclick="resetFilters()">Reset</button>
  <label for="languageFilter">Language</label>
  <select id="languageFilter" onchange="setLanguage(this.value)">
    <option value="en">English</option>
    <option value="vi" selected>Tiếng Việt</option>
  </select>
  <span id="filterCount" class="count-text"></span>
</div>

<div class="cat-tabs">
  <button class="tab active" type="button" data-section="all" onclick="jumpAll()">All Series</button>
  <details class="series-menu">
    <summary class="tab" data-section="wood">Wood Grain ▾</summary>
    <div class="series-dropdown">
      <button class="menu-item" type="button" data-size="" onclick="jumpSeries('wood')">All Wood Grain</button>
      <button class="menu-item" type="button" data-size="750x750" onclick="jumpSpec('750x750', 'wood')">750x750</button>
      <button class="menu-item" type="button" data-size="600x1200" onclick="jumpSpec('600x1200', 'wood')">600x1200</button>
      <button class="menu-item" type="button" data-size="wood-150x900" onclick="jumpSpec('wood-150x900', 'wood')">150x900</button>
      <button class="menu-item" type="button" data-size="wood-200x1000" onclick="jumpSpec('wood-200x1000', 'wood')">200x1000</button>
      <button class="menu-item" type="button" data-size="wood-200x1200" onclick="jumpSpec('wood-200x1200', 'wood')">200x1200</button>
      <button class="menu-item" type="button" data-size="470x1200" onclick="jumpSpec('470x1200', 'wood')">Wood Grain 470x1200x12mm</button>
      <button class="menu-item" type="button" data-size="stair-600-300x1200" onclick="jumpSpec('stair-600-300x1200', 'wood')">Wood Grain 300x1200x15/18mm</button>
      <button class="menu-item" type="button" data-size="wood-deck-200" onclick="jumpSpec('wood-deck-200', 'wood')">Deck 200x1000 / 200x1200</button>
    </div>
  </details>
  <details class="series-menu">
    <summary class="tab" data-section="stair">Stair Step Series ▾</summary>
    <div class="series-dropdown">
      <button class="menu-item" type="button" data-size="" onclick="jumpSeries('stair')">All Stair Step</button>
      <button class="menu-item" type="button" data-size="stair-470x1200" onclick="jumpSpec('stair-470x1200', 'stair')">Golden Silk 470x1200x12mm</button>
      <button class="menu-item" type="button" data-size="golden-silk-470x1200-15" onclick="jumpSpec('golden-silk-470x1200-15', 'stair')">Golden Silk 470x1200x15mm</button>
      <button class="menu-item" type="button" data-size="stair-outdoor" onclick="jumpSpec('stair-outdoor', 'stair')">Outdoor Stair Series</button>
    </div>
  </details>
  <details class="series-menu">
    <summary class="tab" data-section="tile800">800x800 Series ▾</summary>
    <div class="series-dropdown">
      <button class="menu-item" type="button" data-size="" onclick="jumpSeries('tile800')">All 800x800</button>
      <button class="menu-item" type="button" data-size="800x800" onclick="jumpSpec('800x800', 'tile800')">800x800</button>
    </div>
  </details>
  <details class="series-menu">
    <summary class="tab" data-section="tile1000">1000x1000 Series ▾</summary>
    <div class="series-dropdown">
      <button class="menu-item" type="button" data-size="" onclick="jumpSeries('tile1000')">All 1000x1000</button>
      <button class="menu-item" type="button" data-size="1000-glossy" onclick="jumpSpec('1000-glossy', 'tile1000')">Glossy Surface</button>
      <button class="menu-item" type="button" data-size="1000-rustic" onclick="jumpSpec('1000-rustic', 'tile1000')">Rustic Surface</button>
    </div>
  </details>
  <details class="series-menu">
    <summary class="tab" data-section="tile1200">1200x1200 Series ▾</summary>
    <div class="series-dropdown">
      <button class="menu-item" type="button" data-size="" onclick="jumpSeries('tile1200')">All 1200x1200</button>
      <button class="menu-item" type="button" data-size="1200x1200" onclick="jumpSpec('1200x1200', 'tile1200')">1200x1200</button>
    </div>
  </details>
  <details class="series-menu">
    <summary class="tab" data-section="carpet">Carpet Series ▾</summary>
    <div class="series-dropdown">
      <button class="menu-item" type="button" data-size="" onclick="jumpSeries('carpet')">All Carpet</button>
      <button class="menu-item" type="button" data-size="carpet-720x900" onclick="jumpSpec('carpet-720x900', 'carpet')">720x900mm</button>
      <button class="menu-item" type="button" data-size="carpet-750x1350" onclick="jumpSpec('carpet-750x1350', 'carpet')">750x1350mm</button>
    </div>
  </details>
</div>

<main id="catalog"></main>

<button id="toBottom" class="floating-nav to-bottom" type="button" onclick="scrollToBottom()" aria-label="Go to bottom">↓</button>
<button id="backTop" class="floating-nav to-top" type="button" onclick="scrollToTop()" aria-label="Back to top">↑</button>

<div id="lightbox" class="lightbox" aria-label="Product image preview">
  <button class="lb-close" type="button" onclick="closeLightbox()" aria-label="Close">Close</button>

  function specBlock(group) {
    const groupKey = group.mergeKey || `${group.prefix}-${group.start || 1}`;
    const relatedGroups = specGroups.filter((item) => {
      const itemKey = item.mergeKey || `${item.prefix}-${item.start || 1}`;
      return itemKey === groupKey;
    });
    const photos = allPhotos.filter((photo) => photo.groupKey === groupKey);
    const gridContent = relatedGroups.length > 1
      ? relatedGroups.map((item) => {
        const subgroupPhotos = allPhotos.filter((photo) => photo.groupKey === groupKey && photo.sourceKey === item.prefix);
        const itemPackageInfo = packageInfo(item);
        return `
          <div class="spec-subgroup" data-size="${item.sizeKey}">
            <div class="subspec-title">
              <div>${translateText(item.subgroupLabel || item.label)}${itemPackageInfo ? `<small>${itemPackageInfo}</small>` : ""}</div>

            </div>
            <div class="product-grid">${subgroupPhotos.map(productCard).join("")}</div>

      }).join("")
      : `<div class="product-grid">${photos.map(productCard).join("")}</div>`;

    return `
      <section class="spec-block" data-series="${group.series}" data-size="${group.sizeKey}">

          <div>

  function uniqueSpecGroups(series) {
    const woodOrder = {
      "750x750": 1,
      "600x1200": 2,
      "wood-150x900": 3,
      "wood-200x1000": 4,
      "wood-200x1200": 5,
      "470x1200": 6,
      "stair-600-300x1200": 7,
      "wood-deck-200": 8
    };
    const seen = new Set();
    return specGroups.filter((group) => {
      if (group.series !== series) return false;
      const key = group.mergeKey || `${group.prefix}-${group.start || 1}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    }).sort((a, b) => {
      if (series !== "wood") return 0;
      return (woodOrder[a.sizeKey] || 99) - (woodOrder[b.sizeKey] || 99);
    });
  }

        <div class="spec-block" data-series="${section.id}" data-size="">
          <div class="placeholder-grid">
            <div class="placeholder-card">${section.note}</div>
          </div>
        </div>
      </section>
    `;
  }

  function renderCatalog() {
    catalog.innerHTML = `
      <section id="wood" class="series-section" data-series="wood">
        <div class="section-header">
          <h2>${t("Wood Grain Series")}</h2>
          <span>${countText(allPhotos.filter((item) => item.series === "wood").length, "images")} / ${currentLang === "vi" ? "gạch vân gỗ + gạch sàn ngoài trời" : "regular wood tile + wood deck"}</span>
        </div>
        ${uniqueSpecGroups("wood").map(specBlock).join("")}
      </section>
      <section id="stair" class="series-section" data-series="stair">
        <div class="section-header">
          <h2>${t("Stair Step Series")}</h2>
          <span>${countText(allPhotos.filter((item) => item.series === "stair").length, "images")} / ${currentLang === "vi" ? "bộ gạch bậc thang đồng bộ" : "matching stair step sets"}</span>
        </div>
        ${uniqueSpecGroups("stair").map(specBlock).join("")}
      </section>
      <section id="tile800" class="series-section" data-series="tile800">
        <div class="section-header">
          <h2>${t("800x800 Series")}</h2>
          <span>${countText(allPhotos.filter((item) => item.series === "tile800").length, "images")} / ${currentLang === "vi" ? "sản phẩm 800x800" : "800x800 products"}</span>
        </div>
        ${uniqueSpecGroups("tile800").map(specBlock).join("")}
      </section>
      <section id="tile1000" class="series-section" data-series="tile1000">
        <div class="section-header">
          <h2>${t("1000x1000 Series")}</h2>
          <span>${countText(allPhotos.filter((item) => item.series === "tile1000").length, "images")} / ${currentLang === "vi" ? "bề mặt bóng + cổ điển" : "glossy + rustic surface"}</span>
        </div>
        ${uniqueSpecGroups("tile1000").map(specBlock).join("")}
      </section>
      <section id="tile1200" class="series-section" data-series="tile1200">
        <div class="section-header">
          <h2>${t("1200x1200 Series")}</h2>
          <span>${countText(allPhotos.filter((item) => item.series === "tile1200").length, "images")} / ${currentLang === "vi" ? "sản phẩm 1200x1200" : "1200x1200 products"}</span>
        </div>
        ${uniqueSpecGroups("tile1200").map(specBlock).join("")}
      </section>
      <section id="carpet" class="series-section" data-series="carpet">
        <div class="section-header">
          <h2>${t("Carpet Series")}</h2>
          <span>${countText(allPhotos.filter((item) => item.series === "carpet").length, "images")} / 720x900 + 750x1350</span>
        </div>
        ${uniqueSpecGroups("carpet").map(specBlock).join("")}
      </section>
      ${pendingSections.map(pendingSection).join("")}
    `;
    applyFilters();
  }

  function applyFilters() {
    const size = document.querySelector("#sizeFilter").value;
    const series = document.querySelector("#seriesFilter").value;
    let visible = 0;
    let total = 0;

    document.querySelectorAll(".product-card").forEach((card) => {
      total += 1;
      const sizeMatch = !size || (card.dataset.actualSizes || "").split(" ").includes(size);
      const menuSizeMatch = !activeMenuSizeKey || card.dataset.size === activeMenuSizeKey;
      const show = sizeMatch && menuSizeMatch && (!series || card.dataset.series === series);
      card.classList.toggle("hidden", !show);
      if (show) visible += 1;
    });

    document.querySelectorAll(".spec-subgroup").forEach((group) => {
      const cards = [...group.querySelectorAll(".product-card")];
      const anyVisible = cards.some((card) => !card.classList.contains("hidden"));
      group.classList.toggle("hidden", !anyVisible);
    });

    document.querySelectorAll(".spec-block").forEach((block) => {
      const cards = [...block.querySelectorAll(".product-card")];
      if (!cards.length) {
        block.classList.toggle("hidden", !!series && block.dataset.series !== series);
        return;
      }
      const anyVisible = cards.some((card) => !card.classList.contains("hidden"));
      block.classList.toggle("hidden", !anyVisible);
    });

    document.querySelectorAll(".series-section").forEach((section) => {
      const blocks = [...section.querySelectorAll(".spec-block")];
      const anyVisible = blocks.some((block) => !block.classList.contains("hidden"));
      section.style.display = anyVisible ? "" : "none";
    });

    document.querySelector("#filterCount").textContent = currentLang === "vi" ? `${visible} / ${total} hình` : `${visible} / ${total} photos`;
    setActiveSpec(activeMenuSizeKey || size, series);
  }

  function applySizeFilter() {
    activeMenuSizeKey = "";
    applyFilters();
  }

  function applySeriesFilter() {
    activeMenuSizeKey = "";
    applyFilters();
  }

  function resetFilters() {
    document.querySelector("#sizeFilter").value = "";
    document.querySelector("#seriesFilter").value = "";
    activeMenuSizeKey = "";
    applyFilters();
  }

  function setActiveSpec(sizeKey, seriesKey) {
    document.querySelectorAll(".menu-item").forEach((button) => {
      const menu = button.closest(".series-menu");
      const menuSeries = menu?.querySelector(".tab")?.dataset.section;
      const isAllForSeries = !sizeKey && seriesKey && !button.dataset.size && menuSeries === seriesKey;
      button.classList.toggle("active", button.dataset.size === sizeKey && !!sizeKey || isAllForSeries);
    });
  }

  function jumpSpec(sizeKey, sectionId) {
    activeMenuSizeKey = sizeKey;
    const sizeFilter = document.querySelector("#sizeFilter");
    sizeFilter.value = [...sizeFilter.options].some((option) => option.value === sizeKey) ? sizeKey : "";
    document.querySelector("#seriesFilter").value = "";
    applyFilters();
    setActiveTab(sectionId);
    window.setTimeout(() => {
      document.querySelector(`#${sectionId}`)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 40);
    closeSeriesMenus();
  }

  function jumpSeries(sectionId) {
    activeMenuSizeKey = "";
    document.querySelector("#sizeFilter").value = "";
    document.querySelector("#seriesFilter").value = sectionId;
    applyFilters();
    setActiveTab(sectionId);
    window.setTimeout(() => {
      document.querySelector(`#${sectionId}`)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 40);
    closeSeriesMenus();
  }

  function jumpAll() {
    activeMenuSizeKey = "";
    document.querySelector("#sizeFilter").value = "";
    document.querySelector("#seriesFilter").value = "";
    applyFilters();
    setActiveTab("all");
    window.scrollTo({ top: 0, behavior: "smooth" });
    closeSeriesMenus();
  }

  function closeSeriesMenus() {
    document.querySelectorAll(".series-menu[open]").forEach((menu) => {
      menu.removeAttribute("open");
    });
    updateMenuOpenState();
  }

  function updateMenuOpenState() {
    const tabs = document.querySelector(".cat-tabs");
    if (!tabs) return;
    tabs.classList.toggle("menu-open", !!document.querySelector(".series-menu[open]"));
  }

  function setStickyOffsets() {
    const filter = document.querySelector(".filter-bar");
    const tabs = document.querySelector(".cat-tabs");
    document.documentElement.style.setProperty("--filter-height", `${filter.offsetHeight}px`);
    document.documentElement.style.setProperty("--tabs-height", `${tabs.offsetHeight}px`);
    document.documentElement.style.setProperty("--quick-height", "0px");
    positionOpenSeriesMenu();
  }

  function positionOpenSeriesMenu() {
    const menu = document.querySelector(".series-menu[open]");
    if (!menu) return;
    const dropdown = menu.querySelector(".series-dropdown");
    const summary = menu.querySelector("summary");
    if (!dropdown || !summary) return;
    const gap = window.matchMedia("(max-width: 760px)").matches ? 12 : 22;
    const width = Math.min(360, window.innerWidth - gap * 2);
    const rect = summary.getBoundingClientRect();
    const left = Math.max(gap, Math.min(rect.left, window.innerWidth - width - gap));
    dropdown.style.setProperty("--dropdown-left", `${left}px`);
  }

  function setActiveTab(id) {
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.classList.toggle("active", tab.dataset.section === id);
    });
  }

  function toggleSpec(header) {
    header.closest(".spec-block").classList.toggle("collapsed");
  }

  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function scrollToBottom() {
    window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" });
  }

  function updateFloatingNav() {
    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    const nearBottom = window.scrollY > maxScroll - 260;
    document.querySelector("#backTop").classList.toggle("visible", window.scrollY > 460);
    document.querySelector("#toBottom").classList.toggle("visible", !nearBottom);
  }

  function openLightbox(index) {
    activePhotoIndex = index;
    const photo = allPhotos[activePhotoIndex];
    activeGallery = photo.gallery;
    activeGalleryIndex = 0;
    renderLightboxImage();
    document.querySelector("#lightbox").classList.add("active");
  }

  function closeLightbox() {
    document.querySelector("#lightbox").classList.remove("active");
  }

  function moveLightbox(step) {
    activeGalleryIndex = (activeGalleryIndex + step + activeGallery.length) % activeGallery.length;
    renderLightboxImage();
  }

  function renderLightboxImage() {
    const photo = allPhotos[activePhotoIndex];
    const current = activeGallery[activeGalleryIndex];
    document.querySelector("#lb-img").src = current;
    document.querySelector("#lb-img").alt = photo.code;
    const positionText = currentLang === "vi" ? `${activeGalleryIndex + 1} / ${activeGallery.length}` : `${activeGalleryIndex + 1} of ${activeGallery.length}`;
    document.querySelector("#lb-caption").textContent = `${photo.code} / ${translateText(photo.size)} / ${translateText(photo.detailLabel)} / ${positionText}`;
    document.querySelector("#lb-thumbs").innerHTML = activeGallery.map((src, index) => `
      <button class="lb-thumb ${index === activeGalleryIndex ? "active" : ""}" type="button" onclick="selectLightboxImage(${index})">
        <img src="${src}" alt="">
      </button>
    `).join("");
  }

  function selectLightboxImage(index) {
    activeGalleryIndex = index;
    renderLightboxImage();
  }

  document.addEventListener("keydown", (event) => {
    if (!document.querySelector("#lightbox").classList.contains("active")) return;
    if (event.key === "Escape") closeLightbox();
    if (event.key === "ArrowLeft") moveLightbox(-1);
    if (event.key === "ArrowRight") moveLightbox(1);
  });

  document.querySelector("#lightbox").addEventListener("click", (event) => {
    if (event.target.id === "lightbox") closeLightbox();
  });

  window.addEventListener("scroll", updateFloatingNav);

  document.addEventListener("click", (event) => {
    if (!event.target.closest(".series-menu")) closeSeriesMenus();
  });

  document.querySelectorAll(".series-menu").forEach((menu) => {
    menu.addEventListener("toggle", () => {
      updateMenuOpenState();
      if (!menu.open) return;
      const sectionId = menu.querySelector(".tab")?.dataset.section;
      if (sectionId) setActiveTab(sectionId);
      document.querySelectorAll(".series-menu").forEach((other) => {
        if (other !== menu) other.removeAttribute("open");
      });
      updateMenuOpenState();
      positionOpenSeriesMenu();
    });
  });

  const sectionObserver = new IntersectionObserver((entries) => {
    if (document.querySelector(".series-menu[open]")) return;
    const visible = entries
      .filter((entry) => entry.isIntersecting)
      .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
    if (visible) setActiveTab(visible.target.id);
  }, {
    rootMargin: "-35% 0px -55% 0px",
    threshold: [0, .2, .5, .8]
  });

  setLanguage("vi");
  window.addEventListener("resize", setStickyOffsets);
  window.addEventListener("scroll", positionOpenSeriesMenu, { passive: true });
  document.querySelectorAll(".series-section").forEach((section) => sectionObserver.observe(section));
</script>
</body>
</html>
